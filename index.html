<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ผจญภัยหุบเขาแรงและผลของแรง</title>
    <!-- ใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ฟอนต์ Mali (น่ารัก เป็นมิตรกับเด็ก) และเครื่องหมาย -->
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Mali', cursive;
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* สีฟ้าท้องฟ้า */
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        
        /* ================= เอฟเฟกต์ปุ่ม 3 มิติ (Jelly Button) ================= */
        .btn-3d-orange {
            background: linear-gradient(to bottom, #fb923c, #f97316);
            box-shadow: 0 8px 0 #c2410c, 0 15px 20px rgba(0,0,0,0.2);
            border: 4px solid #fff;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-3d-orange:active {
            box-shadow: 0 0px 0 #c2410c, 0 5px 10px rgba(0,0,0,0.2);
            transform: translateY(8px);
        }
        .btn-3d-blue {
            background: linear-gradient(to bottom, #60a5fa, #3b82f6);
            box-shadow: 0 8px 0 #1d4ed8, 0 15px 20px rgba(0,0,0,0.2);
            border: 4px solid #fff;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-3d-blue:active {
            box-shadow: 0 0px 0 #1d4ed8, 0 5px 10px rgba(0,0,0,0.2);
            transform: translateY(8px);
        }
        .btn-choice {
            transition: all 0.15s ease;
            box-shadow: 0 6px 0 #cbd5e1;
        }
        .btn-choice:active:not(:disabled) {
            box-shadow: 0 0px 0 #cbd5e1;
            transform: translateY(6px);
        }

        /* ================= อนิเมชันเด้งดึ๋ง (Bouncy) ================= */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px) rotate(-2deg); }
            40%, 80% { transform: translateX(10px) rotate(2deg); }
        }
        .shake { animation: shake 0.5s; }

        /* ซ่อน Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ตกแต่ง Text ให้ดูมีมิติเหมือนการ์ตูน */
        .text-stroke {
            -webkit-text-stroke: 2px white;
            text-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="select-none">

    <!-- Canvas สำหรับวาดเกม -->
    <canvas id="gameCanvas"></canvas>

    <!-- ==================== UI OVERLAYS ==================== -->

    <!-- 1. HUD (Head-Up Display) -->
    <div id="hud" class="hidden absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none z-10">
        <!-- กล่องสถานะผู้เล่น -->
        <div class="bg-white/90 backdrop-blur-md px-5 py-3 rounded-3xl shadow-[0_6px_0_rgba(0,0,0,0.1)] border-4 border-pink-300 flex items-center gap-4 animate-pop-in">
            <div class="relative w-16 h-16 bg-pink-100 rounded-full border-4 border-white shadow-inner flex items-center justify-center text-4xl" id="hudAvatarBg">
                <span id="hudAvatar" class="animate-bounce">🤠</span>
            </div>
            <div>
                <div id="hudName" class="text-xl font-bold text-pink-500 font-[Nunito]">ชื่อผู้เล่น</div>
                <div class="flex items-center gap-1 mt-1 text-2xl drop-shadow-md" id="hudHearts">❤️❤️❤️</div>
            </div>
        </div>
        
        <!-- กล่องคะแนน -->
        <div class="bg-white/90 backdrop-blur-md px-6 py-3 rounded-3xl shadow-[0_6px_0_rgba(0,0,0,0.1)] border-4 border-yellow-400 text-center animate-pop-in">
            <div class="text-sm font-bold text-yellow-600">ดาวที่สะสมได้ ⭐️</div>
            <div class="text-3xl font-black text-yellow-500 font-[Nunito] drop-shadow-sm" id="hudScore">0 / 20</div>
        </div>
    </div>

    <!-- Progress Bar (ด้านบนตรงกลาง) -->
    <div id="progressBarContainer" class="hidden absolute top-6 left-1/2 transform -translate-x-1/2 w-1/3 max-w-sm bg-white/80 rounded-full h-6 shadow-[0_4px_0_rgba(0,0,0,0.1)] z-10 pointer-events-none border-4 border-white overflow-visible">
        <div id="progressBar" class="bg-gradient-to-r from-green-400 to-green-500 h-full rounded-full transition-all duration-500 relative">
            <!-- ตัววิ่งบนหลอด -->
            <div id="progressAvatar" class="absolute -top-4 -right-4 text-3xl drop-shadow-md transition-all duration-300 transform hover:scale-125">🤠</div>
        </div>
        <div class="absolute -top-3 -right-6 text-3xl drop-shadow-md">🏁</div>
    </div>

    <!-- 2. Mobile Controls (จอยสติ๊ก 3 มิติ) -->
    <div id="mobileControls" class="hidden absolute bottom-6 left-0 w-full px-6 flex justify-between z-20">
        <div class="flex gap-4">
            <button id="btnLeft" class="w-20 h-20 bg-white/70 backdrop-blur-sm rounded-full shadow-[0_8px_0_rgba(0,0,0,0.2)] border-4 border-blue-300 text-4xl flex items-center justify-center active:translate-y-2 active:shadow-[0_0px_0_rgba(0,0,0,0.2)] active:bg-blue-100 transition-all text-blue-500">⬅️</button>
            <button id="btnRight" class="w-20 h-20 bg-white/70 backdrop-blur-sm rounded-full shadow-[0_8px_0_rgba(0,0,0,0.2)] border-4 border-blue-300 text-4xl flex items-center justify-center active:translate-y-2 active:shadow-[0_0px_0_rgba(0,0,0,0.2)] active:bg-blue-100 transition-all text-blue-500">➡️</button>
        </div>
        <button id="btnJump" class="w-24 h-24 bg-gradient-to-t from-pink-400 to-pink-300 rounded-full shadow-[0_10px_0_#be185d,0_15px_20px_rgba(0,0,0,0.3)] border-4 border-white text-5xl flex items-center justify-center active:translate-y-3 active:shadow-[0_0px_0_#be185d] transition-all text-white font-bold pb-2">⬆️</button>
    </div>

    <!-- 3. Start Screen (ดีไซน์ใหม่) -->
    <div id="startScreen" class="absolute inset-0 bg-gradient-to-b from-sky-300 to-blue-200 flex flex-col items-center justify-center z-30 p-4 overflow-hidden">
        
        <!-- ตกแต่งฉากหลังหน้าเริ่มเกม -->
        <div class="absolute top-10 left-10 text-6xl opacity-50 animate-float" style="animation-delay: 0s;">☁️</div>
        <div class="absolute top-20 right-20 text-7xl opacity-60 animate-float" style="animation-delay: 1s;">☁️</div>
        <div class="absolute bottom-20 left-1/4 text-8xl opacity-40 animate-float" style="animation-delay: 2s;">🎈</div>

        <!-- กล่องเมนูหลัก -->
        <div class="bg-white/95 backdrop-blur-md p-8 rounded-[3rem] shadow-[0_15px_40px_rgba(0,0,0,0.2)] border-8 border-white max-w-md w-full text-center relative animate-pop-in">
            
            <div class="absolute -top-16 left-1/2 transform -translate-x-1/2 text-8xl animate-bounce">🌟</div>

            <h1 class="text-4xl font-black text-pink-500 mb-2 mt-8 text-stroke font-[Nunito]">ผจญภัยหุบเขา</h1>
            <h2 class="text-3xl font-black text-yellow-400 mb-8 text-stroke drop-shadow-md font-[Nunito]">แรงและผลของแรง</h2>
            
            <div class="mb-6">
                <input type="text" id="playerNameInput" class="w-full px-6 py-4 rounded-3xl border-4 border-blue-100 bg-blue-50 focus:bg-white focus:outline-none focus:border-blue-400 text-center text-xl font-bold text-gray-700 transition-colors shadow-inner" placeholder="พิมพ์ชื่อนักสำรวจ..." maxlength="12">
            </div>

            <div class="mb-8">
                <label class="block text-gray-500 font-bold mb-3 text-lg">เลือกตัวละครของคุณ:</label>
                <div class="flex justify-center gap-3">
                    <button class="avatar-btn text-5xl hover:scale-110 transition-transform bg-gray-100 p-3 rounded-3xl border-4 border-transparent selected-avatar shadow-sm" data-avatar="🤠">🤠</button>
                    <button class="avatar-btn text-5xl hover:scale-110 transition-transform bg-gray-100 p-3 rounded-3xl border-4 border-transparent shadow-sm" data-avatar="👩‍🚀">👩‍🚀</button>
                    <button class="avatar-btn text-5xl hover:scale-110 transition-transform bg-gray-100 p-3 rounded-3xl border-4 border-transparent shadow-sm" data-avatar="🦊">🦊</button>
                    <button class="avatar-btn text-5xl hover:scale-110 transition-transform bg-gray-100 p-3 rounded-3xl border-4 border-transparent shadow-sm" data-avatar="🦄">🦄</button>
                </div>
            </div>

            <button id="startBtn" class="w-full btn-3d-orange text-white font-[Nunito] font-black text-3xl py-5 rounded-3xl">
                เริ่มลุยเลย! 🚀
            </button>
        </div>
    </div>

    <!-- 4. Question Modal -->
    <div id="questionModal" class="hidden absolute inset-0 bg-blue-900/40 backdrop-blur-sm flex items-center justify-center z-40 p-4">
        <div id="questionBox" class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border-8 border-blue-400 max-w-lg w-full flex flex-col max-h-[90vh] animate-pop-in relative">
            
            <!-- ไอคอนเห็ดเรืองแสงด้านบน -->
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 w-24 h-24 bg-gradient-to-b from-blue-300 to-blue-500 rounded-full border-4 border-white shadow-[0_0_20px_rgba(59,130,246,0.5)] flex items-center justify-center text-5xl animate-float">🍄</div>
            
            <h3 id="questionText" class="text-xl md:text-2xl font-bold text-gray-800 text-center mb-6 mt-8 leading-relaxed">คำถาม?</h3>
            
            <div id="choicesContainer" class="flex flex-col gap-4 mb-6 overflow-y-auto no-scrollbar px-2 pb-2">
                <!-- ตัวเลือกจะถูกสร้างด้วย JS -->
            </div>

            <!-- ส่วนเฉลย (ซ่อนไว้ตอนแรก) -->
            <div id="explanationBox" class="hidden bg-gray-50 p-5 rounded-3xl border-4 mb-4 overflow-y-auto no-scrollbar animate-pop-in">
                <div id="resultTitle" class="font-black text-2xl mb-3 text-center font-[Nunito]"></div>
                <p id="explanationText" class="text-gray-700 text-center leading-relaxed font-semibold text-lg"></p>
            </div>

            <button id="continueBtn" class="hidden w-full btn-3d-blue text-white font-[Nunito] font-black text-2xl py-4 rounded-3xl mt-auto">
                เดินทางต่อ ➡️
            </button>
        </div>
    </div>

    <!-- 5. Game Over / Victory Modal -->
    <div id="endModal" class="hidden absolute inset-0 bg-black/60 backdrop-blur-md flex flex-col items-center justify-center z-50 p-4 text-center">
        <div class="bg-white p-8 rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-8 max-w-md w-full animate-pop-in relative" id="endBox">
            
            <div id="endIcon" class="absolute -top-16 left-1/2 transform -translate-x-1/2 text-8xl drop-shadow-xl animate-bounce">💀</div>
            
            <h1 id="endTitle" class="text-5xl font-black mb-2 mt-6 font-[Nunito] text-stroke">เกมโอเวอร์!</h1>
            <p id="endDesc" class="text-gray-500 font-bold mb-6 text-xl">พยายามใหม่อีกครั้งนะ</p>
            
            <div class="bg-gray-100 p-6 rounded-3xl mb-8 shadow-inner border-4 border-gray-200">
                <div class="text-gray-500 font-black text-lg mb-2">ดาวที่สะสมได้ทั้งหมด</div>
                <div class="text-6xl font-black text-yellow-500 drop-shadow-md font-[Nunito]" id="finalScore">0 / 20</div>
            </div>

            <button id="restartBtn" class="w-full btn-3d-orange text-white font-[Nunito] font-black text-2xl py-4 rounded-3xl">
                เล่นอีกครั้ง 🔄
            </button>
        </div>
    </div>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // ----------------------------------------------------------------------
        // ชุดข้อมูลคำถาม 20 ข้อ (วิทยาศาสตร์ ป.3: แรงและผลของแรง)
        // ----------------------------------------------------------------------
        const questionsData = [
            { q: "1. การออกแรงกระทำต่อวัตถุ หมายถึงข้อใด?", choices: ["การมองดูวัตถุ", "การผลักหรือดึงวัตถุ", "การปล่อยวัตถุไว้เฉยๆ"], ans: 1, exp: "แรง คือ อำนาจที่ดึงหรือผลักวัตถุ ทำให้วัตถุเปลี่ยนแปลงสภาพไปจ้า" },
            { q: "2. ข้อใดคือ 'ผลของแรง' ที่ทำให้วัตถุเปลี่ยนรูปร่าง?", choices: ["เตะฟุตบอล", "ปั้นดินน้ำมัน", "เข็นรถเข็น"], ans: 1, exp: "การบีบหรือปั้นดินน้ำมัน ทำให้ดินน้ำมันเปลี่ยนรูปร่างไปตามแรงมือของเรานั่นเอง" },
            { q: "3. เมื่อเราเตะลูกฟุตบอลที่วางนิ่งอยู่ ผลของแรงคืออะไร?", choices: ["ฟุตบอลเปลี่ยนรูปร่าง", "ฟุตบอลเคลื่อนที่", "ฟุตบอลหยุดนิ่ง"], ans: 1, exp: "แรงจากการเตะทำให้ลูกฟุตบอลที่อยู่นิ่ง พุ่งกระเด็นออกไป!" },
            { q: "4. ผู้รักษาประตูรับลูกฟุตบอลที่พุ่งมา เป็นการออกแรงแบบใด?", choices: ["ทำให้วัตถุเคลื่อนที่เร็วขึ้น", "ทำให้วัตถุเปลี่ยนทิศทาง", "ทำให้วัตถุหยุดนิ่ง"], ans: 2, exp: "การรับลูกบอล ทำให้ลูกบอลที่กำลังพุ่งมาหยุดนิ่งอยู่ในมือของเรา" },
            { q: "5. 'แรงสัมผัส' หมายถึงอะไร?", choices: ["แรงที่วัตถุต้องแตะกัน", "แรงที่วัตถุไม่ต้องแตะกัน", "แรงที่เกิดจากแม่เหล็ก"], ans: 0, exp: "แรงสัมผัส คือผิวของวัตถุต้องสัมผัสกัน เช่น การใช้มือผลักประตู" },
            { q: "6. ข้อใดคือ 'แรงไม่สัมผัส'?", choices: ["การปั่นจักรยาน", "แม่เหล็กดูดคลิป", "การยกกระเป๋า"], ans: 1, exp: "แม่เหล็กสามารถดึงดูดของได้โดยไม่ต้องแตะกันเลย เรียกว่า แรงแม่เหล็ก (แรงไม่สัมผัส)" },
            { q: "7. สิ่งใดที่ทำให้แอปเปิลร่วงลงสู่พื้นดินเสมอ?", choices: ["แรงลม", "แรงผลัก", "แรงโน้มถ่วงของโลก"], ans: 2, exp: "โลกของเรามี 'แรงโน้มถ่วง' ที่ดอยดูดของทุกอย่างให้ตกลงพื้นเสมอ" },
            { q: "8. 'น้ำหนัก' ของสิ่งของต่างๆ เกิดจากอะไร?", choices: ["ขนาดของสิ่งของ", "แรงโน้มถ่วงของโลก", "รูปร่างของสิ่งของ"], ans: 1, exp: "น้ำหนัก คือ แรงโน้มถ่วงของโลกที่ดึงดูดวัตถุนั้น ยิ่งของชิ้นใหญ่โลกก็ยิ่งดึงดูดแรง (หนักมาก)" },
            { q: "9. เราใช้เครื่องมือใดในการวัด 'แรง'?", choices: ["ไม้บรรทัด", "เครื่องชั่งสปริง", "กระบอกตวง"], ans: 1, exp: "เครื่องชั่งสปริง ใช้สำหรับวัดแรงดึงและน้ำหนัก โดยดูจากการยืดของสปริง" },
            { q: "10. หน่วยของ 'แรง' และ 'น้ำหนัก' คืออะไร?", choices: ["กิโลกรัม (kg)", "เซนติเมตร (cm)", "นิวตัน (N)"], ans: 2, exp: "แรงมีหน่วยเป็น 'นิวตัน' ตั้งตามชื่อ เซอร์ ไอแซก นิวตัน ผู้ค้นพบแรงโน้มถ่วงนั่นเอง!" },
            { q: "11. แม่เหล็ก จะสามารถดึงดูดวัตถุชนิดใดได้?", choices: ["ยางลบ", "ไม้บรรทัดพลาสติก", "ตะปูเหล็ก"], ans: 2, exp: "แม่เหล็กดึงดูดได้เฉพาะวัตถุที่เป็น 'สารแม่เหล็ก' เช่น เหล็ก (ตะปูทำจากเหล็ก)" },
            { q: "12. ถ้านำแม่เหล็ก 'ขั้วเหนือ (N)' เข้าใกล้ 'ขั้วเหนือ (N)' จะเกิดอะไรขึ้น?", choices: ["ดูดติดกัน", "ผลักออกจากกัน", "ไม่มีอะไรเกิดขึ้น"], ans: 1, exp: "ขั้วแม่เหล็กที่เหมือนกัน จะออกแรง 'ผลัก' กันเสมอ" },
            { q: "13. ถ้านำแม่เหล็ก 'ขั้วเหนือ (N)' เข้าใกล้ 'ขั้วใต้ (S)' จะเกิดอะไรขึ้น?", choices: ["ดูดติดกัน", "ผลักออกจากกัน", "หยุดนิ่ง"], ans: 0, exp: "ขั้วแม่เหล็กที่ต่างกัน จะออกแรง 'ดึงดูด' เข้าหากัน" },
            { q: "14. ข้อใดคือข้อดีของแรงโน้มถ่วงของโลก?", choices: ["ทำให้เรากระโดดสูงมากๆ", "ทำให้สิ่งของไม่ลอยไปมา", "ทำให้ยกของหนักได้ง่าย"], ans: 1, exp: "แรงโน้มถ่วงช่วยให้เราเดินบนพื้นได้ ถ้าน้ำไม่มีแรงโน้มถ่วง ทุกอย่างจะลอยคว้างในอากาศ" },
            { q: "15. ข้อใดอาจถือว่าเป็นข้อจำกัดของแรงโน้มถ่วง?", choices: ["ทำให้น้ำไหลลงที่ต่ำ", "ทำให้ฝนตก", "ทำให้เรายกของหนักลำบาก"], ans: 2, exp: "เวลาเรายกของ เราต้องสู้กับแรงโน้มถ่วง ยิ่งของหนัก ยิ่งเหนื่อย!" },
            { q: "16. การเล่นชักเย่อ เป็นการใช้แรงชนิดใดเป็นหลัก?", choices: ["แรงดึง", "แรงผลัก", "แรงแม่เหล็ก"], ans: 0, exp: "การชักเย่อ คือการออกแรง 'ดึง' เชือกเข้าหาตัวเรา" },

        // ----------------------------------------------------------------------
        // ระบบเสียง (Juicy Audio)
        // ----------------------------------------------------------------------
        const AudioSys = {
            ctx: null,
            init: function() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone: function(freq, type, duration, vol=0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            jump: function() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.15); // เสียงปี๊ดขึ้น
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.15);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.15);
            },
            correct: function() { // เสียงเก็บดาว ติ๊ง-ตริ๊ง
                this.playTone(659.25, 'sine', 0.1, 0.1); 
                setTimeout(() => this.playTone(880.00, 'sine', 0.2, 0.15), 100); 
            },
            wrong: function() { // เสียงแป่ว
                this.playTone(250, 'triangle', 0.1, 0.1);
                setTimeout(() => this.playTone(150, 'sawtooth', 0.3, 0.1), 100);
            },
            pop: function() { // เสียง UI เด้ง
                this.playTone(800, 'sine', 0.05, 0.05);
            },
            victory: function() { // เพลงสั้นๆ
                const notes = [{f: 523, d: 0.1}, {f: 659, d: 0.1}, {f: 783, d: 0.1}, {f: 1046, d: 0.3}];
                let time = 0;
                notes.forEach(n => { setTimeout(() => this.playTone(n.f, 'square', n.d, 0.1), time); time += n.d * 1000 + 50; });
            }
        };

        // ----------------------------------------------------------------------
        // ตัวแปรหลักของเกม (Game Logic)
        // ----------------------------------------------------------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let GAME_STATE = 'START';
        let animationId;
        
        // ตัวละคร (เพิ่ม Squash & Stretch)
        const player = {
            name: "นักสำรวจ", avatar: "🤠",
            x: 100, y: 0,
            width: 46, height: 46, // ทำให้เป็นทรงกลมๆ หน่อย
            vx: 0, vy: 0,
            speed: 6, jumpPower: -13, gravity: 0.6,
            isGrounded: false,
            scaleX: 1, scaleY: 1, // สำหรับทำอนิเมชันยืดหด
            hearts: 3, score: 0,
            checkpointX: 100, checkpointY: 0
        };

        const keys = { left: false, right: false, jump: false };
        let camera = { x: 0 };

        let platforms = [];
        let mushrooms = [];
        let particles = []; // พลุ Confetti
        let clouds = []; // เมฆพื้นหลัง
        let finishLine = { x: 0, w: 120, h: 400 };

        // ----------------------------------------------------------------------
        // การสร้างด่าน & ฉาก
        // ----------------------------------------------------------------------
        function initBackground() {
            clouds = [];
            for(let i=0; i<20; i++) {
                clouds.push({
                    x: Math.random() * 8000,
                    y: Math.random() * (canvas.height / 2),
                    size: Math.random() * 30 + 30,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function generateLevel() {
            platforms = [];
            mushrooms = [];
            
            platforms.push({ x: 0, y: canvas.height - 120, w: 500, h: 200, color: '#34d399' }); // แท่นเริ่ม
            player.checkpointY = canvas.height - 120 - player.height;

            let currentX = 500;
            const baseY = canvas.height - 150;
            const colors = ['#34d399', '#fbbf24', '#60a5fa', '#f472b6', '#a78bfa']; // สีแท่นแบบพาสเทล

            for(let i=0; i<questionsData.length; i++) {
                let gap = Math.floor(Math.random() * 100) + 100; // หลุม
                let pWidth = Math.floor(Math.random() * 150) + 200; // ความกว้างแท่น
                let pY = baseY - (Math.floor(Math.random() * 4) * 40); // ระดับความสูง
                let pCol = colors[i % colors.length];

                let pX = currentX + gap;
                platforms.push({ x: pX, y: pY, w: pWidth, h: canvas.height, color: pCol });

                mushrooms.push({
                    x: pX + pWidth/2 - 25, y: pY - 70,
                    w: 50, h: 50, qIndex: i, active: true, floatY: 0
                });

                currentX = pX + pWidth;
            }

            platforms.push({ x: currentX + 150, y: baseY, w: 1000, h: 200, color: '#34d399' }); // แท่นจบ
            finishLine.x = currentX + 400;
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(GAME_STATE === 'START') initBackground();
        }
        window.addEventListener('resize', resize);
        resize();

        // ----------------------------------------------------------------------
        // ระบบ Input (เพิ่มความหนึบหนับ)
        // ----------------------------------------------------------------------
        function doJump() {
            if(GAME_STATE === 'PLAYING' && player.isGrounded) {
                player.vy = player.jumpPower;
                player.isGrounded = false;
                player.scaleX = 0.6; // ยืดตัวตอนกระโดด
                player.scaleY = 1.4;
                AudioSys.jump();
            }
        }

        window.addEventListener('keydown', (e) => {
            if(GAME_STATE !== 'PLAYING') return;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if(e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') doJump();
        });

        window.addEventListener('keyup', (e) => {
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        // Touch Controls
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const handleTouch = (btn, key, isDown) => {
            const evts = ['touchstart', 'mousedown'];
            const evtsEnd = ['touchend', 'mouseup', 'mouseleave'];
            evts.forEach(evt => btn.addEventListener(evt, (e) => { e.preventDefault(); if(GAME_STATE==='PLAYING') keys[key] = isDown; }));
            evtsEnd.forEach(evt => btn.addEventListener(evt, (e) => { e.preventDefault(); keys[key] = !isDown; }));
        }
        handleTouch(document.getElementById('btnLeft'), 'left', true);
        handleTouch(document.getElementById('btnRight'), 'right', true);
        const btnJump = document.getElementById('btnJump');
        btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
        btnJump.addEventListener('mousedown', (e) => { e.preventDefault(); doJump(); });

        // ----------------------------------------------------------------------
        // UI Events
        // ----------------------------------------------------------------------
        document.querySelectorAll('.avatar-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                AudioSys.pop();
                document.querySelectorAll('.avatar-btn').forEach(b => {
                    b.classList.remove('border-blue-400', 'bg-blue-100', 'scale-110');
                    b.classList.add('border-transparent', 'bg-gray-100');
                });
                const target = e.currentTarget;
                target.classList.remove('border-transparent', 'bg-gray-100');
                target.classList.add('border-blue-400', 'bg-blue-100', 'scale-110');
                player.avatar = target.dataset.avatar;
            });
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            AudioSys.init(); AudioSys.pop();
            const nameInput = document.getElementById('playerNameInput').value.trim();
            player.name = nameInput === "" ? "น้องคนเก่ง" : nameInput;
            
            document.getElementById('hudName').textContent = player.name;
            document.getElementById('hudAvatar').textContent = player.avatar;
            document.getElementById('progressAvatar').textContent = player.avatar;
            
            startGame();
        });

        function startGame() {
            initBackground();
            generateLevel();
            player.x = 100; player.y = canvas.height - 300;
            player.vx = 0; player.vy = 0;
            player.hearts = 3; player.score = 0;
            player.checkpointX = 100; player.checkpointY = canvas.height - 200;
            keys.left = false; keys.right = false;
            
            updateHUD();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('endModal').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('progressBarContainer').classList.remove('hidden');
            if(isMobile) document.getElementById('mobileControls').classList.remove('hidden');
            
            GAME_STATE = 'PLAYING';
            if(!animationId) loop();
        }

        function updateHUD() {
            document.getElementById('hudHearts').textContent = '❤️'.repeat(player.hearts) + '🖤'.repeat(3 - player.hearts);
            document.getElementById('hudScore').textContent = `${player.score} / ${questionsData.length}`;
            let progress = (player.x / finishLine.x) * 100;
            progress = Math.max(0, Math.min(progress, 100));
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        // ----------------------------------------------------------------------
        // ระบบคำถาม (Question Modal)
        // ----------------------------------------------------------------------
        let currentQuestionObj = null;
        let currentMushroomRef = null;

        function showQuestion(qIndex, mushroom) {
            GAME_STATE = 'QUESTION'; AudioSys.pop();
            keys.left = false; keys.right = false;
            if(isMobile) document.getElementById('mobileControls').classList.add('hidden');

            currentQuestionObj = questionsData[qIndex];
            currentMushroomRef = mushroom;

            document.getElementById('questionText').textContent = currentQuestionObj.q;
            const container = document.getElementById('choicesContainer');
            container.innerHTML = '';
            
            document.getElementById('explanationBox').classList.add('hidden');
            document.getElementById('continueBtn').classList.add('hidden');
            const qBox = document.getElementById('questionBox');
            qBox.className = "bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border-8 border-blue-400 max-w-lg w-full flex flex-col max-h-[90vh] animate-pop-in relative";

            currentQuestionObj.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                // สไตล์ปุ่มตัวเลือกแบบเยลลี่
                btn.className = "btn-choice w-full text-left px-6 py-4 rounded-2xl border-2 border-gray-200 bg-white text-gray-700 font-bold text-lg hover:border-blue-400 hover:bg-blue-50 focus:outline-none";
                btn.innerHTML = `<span class="inline-block w-8 h-8 bg-gray-100 text-center rounded-full mr-3 text-blue-500 border border-gray-300 pointer-events-none">${index+1}</span> ${choice}`;
                btn.onclick = () => answerQuestion(index, btn);
                container.appendChild(btn);
            });

            document.getElementById('questionModal').classList.remove('hidden');
        }

        function answerQuestion(selectedIndex, btnElement) {
            const btns = document.getElementById('choicesContainer').querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            const expBox = document.getElementById('explanationBox');
            const resTitle = document.getElementById('resultTitle');
            const qBox = document.getElementById('questionBox');

            expBox.classList.remove('hidden', 'bg-green-50', 'bg-red-50', 'border-green-300', 'border-red-300');
            qBox.classList.remove('border-blue-400');

            if (selectedIndex === currentQuestionObj.ans) {
                AudioSys.correct();
                player.score++; updateHUD();
                
                btnElement.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                btnElement.querySelector('span').classList.replace('text-blue-500', 'text-green-600');
                btnElement.querySelector('span').classList.replace('bg-gray-100', 'bg-green-200');

                resTitle.textContent = "🎉 ยอดเยี่ยม! ได้ 1 ดาว";
                resTitle.className = "font-black text-2xl mb-2 text-center text-green-600 font-[Nunito]";
                expBox.classList.add('bg-green-50', 'border-green-300');
                qBox.classList.add('border-green-400');

                createConfetti(); // ฉลอง!

            } else {
                AudioSys.wrong();
                qBox.classList.remove('shake'); void qBox.offsetWidth; qBox.classList.add('shake');

                btnElement.classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                
                // ไฮไลต์ข้อถูก
                btns[currentQuestionObj.ans].classList.add('bg-green-50', 'border-green-500');

                resTitle.textContent = "💡 เกือบถูกแล้ว! มาดูเฉลยกัน";
                resTitle.className = "font-black text-2xl mb-2 text-center text-red-500 font-[Nunito]";
                expBox.classList.add('bg-red-50', 'border-red-300');
                qBox.classList.add('border-red-400');
            }

            document.getElementById('explanationText').textContent = currentQuestionObj.exp;
            document.getElementById('continueBtn').classList.remove('hidden');
            document.getElementById('continueBtn').classList.add('animate-pop-in');
        }

        document.getElementById('continueBtn').addEventListener('click', () => {
            AudioSys.pop();
            document.getElementById('questionModal').classList.add('hidden');
            currentMushroomRef.active = false;
            
            // เอฟเฟกต์ควันตอนเห็ดหาย
            for(let i=0; i<10; i++) particles.push(new Particle(currentMushroomRef.x+25, currentMushroomRef.y+25, '#ffffff'));
            
            if(isMobile) document.getElementById('mobileControls').classList.remove('hidden');
            GAME_STATE = 'PLAYING';
        });

        // ----------------------------------------------------------------------
        // ระบบอนุภาค (Confetti & พลุ)
        // ----------------------------------------------------------------------
        class Particle {
            constructor(x, y, color, isConfetti=false) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * (isConfetti ? 20 : 10);
                this.vy = (Math.random() - 0.5) * (isConfetti ? 20 : 10) - (isConfetti ? 5 : 2);
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 8 + 4;
                this.rot = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.5;
                this.isConfetti = isConfetti;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.4; // แรงโน้มถ่วงของ particle
                this.life -= 0.015;
                this.rot += this.rotSpeed;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot);
                ctx.fillStyle = this.color;
                if(this.isConfetti) ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size*0.6);
                else { ctx.beginPath(); ctx.arc(0,0, this.size, 0, Math.PI*2); ctx.fill(); }
                ctx.restore();
                ctx.globalAlpha = 1.0;
            }
        }

        function createConfetti() {
            const colors = ['#facc15', '#fb923c', '#f87171', '#60a5fa', '#34d399', '#c084fc'];
            for(let i=0; i<80; i++) {
                // สร้างพุ่งออกมาจากกลางจอ (ใน UI) -- จำลองโดยวาดบน Canvas ตรงจุดที่กล้องอยู่
                particles.push(new Particle(camera.x + canvas.width/2, camera.y + canvas.height/2, colors[Math.floor(Math.random()*colors.length)], true));
            }
        }

        // ----------------------------------------------------------------------
        // Physics & Game Loop
        // ----------------------------------------------------------------------
        function update() {
            if (GAME_STATE !== 'PLAYING') return;

            // เดิน
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx = 0;

            // เอนตัวเวลาเดิน
            if(player.vx !== 0 && player.isGrounded) player.rot = (Math.sin(Date.now()/100) * 0.1);
            else player.rot = 0;

            // การคืนรูป (Squash & Stretch Recovery)
            player.scaleX += (1 - player.scaleX) * 0.2;
            player.scaleY += (1 - player.scaleY) * 0.2;

            player.vy += player.gravity;
            player.y += player.vy;
            player.isGrounded = false;

            // ชนพื้น (ตรวจสอบการเหยียบ)
            for (let p of platforms) {
                if (player.vy >= 0 && 
                    player.y + player.height >= p.y && 
                    player.y + player.height <= p.y + player.vy + 3 && 
                    player.x + player.width > p.x && 
                    player.x < p.x + p.w) {
                    
                    if(!player.isGrounded) { // เพิ่งตกถึงพื้น
                        player.scaleX = 1.4; // แบนออก
                        player.scaleY = 0.6;
                        // เสียงตุ้บเบาๆ (ถ้าต้องการ)
                    }
                    player.isGrounded = true;
                    player.vy = 0;
                    player.y = p.y - player.height;
                    
                    // บันทึกจุดเกิดใหม่
                    player.checkpointX = p.x + 20;
                    player.checkpointY = p.y - player.height - 20;
                }
            }

            player.x += player.vx;
            if(player.x < 0) player.x = 0; // กันเดินทะลุหลัง

            // ตกหลุม
            if (player.y > canvas.height + 200) {
                player.hearts--; AudioSys.wrong(); updateHUD();
                
                // เอฟเฟกต์หน้าจอสั่นเวลากลับมาเกิด
                document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake');

                if (player.hearts <= 0) gameOver();
                else {
                    player.x = player.checkpointX;
                    player.y = player.checkpointY;
                    player.vx = 0; player.vy = 0;
                }
            }

            // เก็บเห็ด
            for (let m of mushrooms) {
                if (m.active) {
                    if (player.x < m.x + m.w && player.x + player.width > m.x &&
                        player.y < m.y + m.h && player.height + player.y > m.y) {
                            showQuestion(m.qIndex, m);
                    }
                    m.floatY = Math.sin(Date.now() / 200) * 8; // เด้งดึ๋งๆ
                }
            }

            // เข้าเส้นชัย
            if (player.x > finishLine.x) victory();

            // กล้องตามผู้เล่นแบบ Smooth
            let targetCamX = player.x - canvas.width / 3;
            camera.x += (targetCamX - camera.x) * 0.1;
            if(camera.x < 0) camera.x = 0;

            updateHUD();

            // อัปเดตเมฆ
            clouds.forEach(c => { c.x -= c.speed; if(c.x < camera.x - 200) c.x = camera.x + canvas.width + 200; });
        }

        // ----------------------------------------------------------------------
        // การจบเกม
        // ----------------------------------------------------------------------
        function gameOver() {
            GAME_STATE = 'GAMEOVER';
            if(isMobile) document.getElementById('mobileControls').classList.add('hidden');
            
            document.getElementById('endIcon').textContent = "😭";
            document.getElementById('endTitle').textContent = "หมดแรงซะแล้ว!";
            document.getElementById('endTitle').className = "text-5xl font-black mb-2 mt-6 font-[Nunito] text-stroke text-red-500";
            document.getElementById('endDesc').textContent = "ไม่เป็นไร ลองใหม่อีกครั้งนะคนเก่ง";
            document.getElementById('finalScore').textContent = `${player.score} / ${questionsData.length}`;
            document.getElementById('endBox').className = "bg-white p-8 rounded-[3rem] shadow-[0_20px_50px_rgba(220,38,38,0.5)] border-8 border-red-400 max-w-md w-full animate-pop-in relative";
            
            document.getElementById('endModal').classList.remove('hidden');
        }

        function victory() {
            GAME_STATE = 'VICTORY'; AudioSys.victory();
            if(isMobile) document.getElementById('mobileControls').classList.add('hidden');
            
            document.getElementById('endIcon').textContent = "🏆";
            document.getElementById('endTitle').textContent = "เก่งมาก เย้!";
            document.getElementById('endTitle').className = "text-5xl font-black mb-2 mt-6 font-[Nunito] text-stroke text-green-500";
            document.getElementById('endDesc').textContent = "หนูคือสุดยอดนักวิทยาศาสตร์ตัวน้อย!";
            document.getElementById('finalScore').textContent = `${player.score} / ${questionsData.length}`;
            document.getElementById('endBox').className = "bg-white p-8 rounded-[3rem] shadow-[0_20px_50px_rgba(52,211,153,0.5)] border-8 border-yellow-400 max-w-md w-full animate-pop-in relative";
            
            createConfetti(); // พลุฉลอง
            let intV = setInterval(() => {
                if(GAME_STATE !== 'VICTORY') clearInterval(intV);
                else createConfetti();
            }, 1000);

            document.getElementById('endModal').classList.remove('hidden');
        }

        document.getElementById('restartBtn').addEventListener('click', () => {
            AudioSys.pop();
            document.getElementById('endModal').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('progressBarContainer').classList.add('hidden');
        });

        // ----------------------------------------------------------------------
        // Rendering (วาดรูปลง Canvas)
        // ----------------------------------------------------------------------
        function drawBackground() {
            // ท้องฟ้าพาสเทล
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, "#bae6fd"); // ฟ้าอ่อน
            grad.addColorStop(1, "#fdf4ff"); // ชมพูอ่อนๆ ด้านล่าง
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // วาดพระอาทิตย์น่ารักๆ
            ctx.save();
            ctx.translate(canvas.width - 150, 150);
            ctx.rotate(Date.now() / 2000); // หมุนช้าๆ
            ctx.fillStyle = "#fef08a";
            ctx.beginPath();
            for(let i=0; i<12; i++) { // แฉก
                ctx.rotate(Math.PI/6);
                ctx.lineTo(0, 80); ctx.lineTo(10, 40);
            }
            ctx.fill();
            ctx.fillStyle = "#fde047";
            ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI*2); ctx.fill(); // ดวง
            // หน้าพระอาทิตย์
            ctx.rotate(-Date.now() / 2000); // หมุนหน้ากลับให้ตรง
            ctx.fillStyle = "#854d0e";
            ctx.beginPath(); ctx.arc(-15, -10, 5, 0, Math.PI*2); ctx.fill(); // ตาซ้าย
            ctx.beginPath(); ctx.arc(15, -10, 5, 0, Math.PI*2); ctx.fill();  // ตาขวา
            ctx.beginPath(); ctx.arc(0, 10, 10, 0, Math.PI); ctx.stroke();   // ยิ้ม
            ctx.restore();

            // วาดเมฆ
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            clouds.forEach(c => {
                let drawX = c.x - (camera.x * 0.1); // Parallax ช้าๆ
                ctx.beginPath();
                ctx.arc(drawX, c.y, c.size, Math.PI*0.5, Math.PI*1.5);
                ctx.arc(drawX + c.size*0.7, c.y - c.size*0.4, c.size*0.8, Math.PI*1, Math.PI*2);
                ctx.arc(drawX + c.size*1.6, c.y, c.size*0.9, Math.PI*1.5, Math.PI*0.5);
                ctx.fill();
            });
            
            // ภูเขาหลังสุด
            ctx.fillStyle = "#bfdbfe";
            for(let i=0; i<canvas.width/200 + 10; i++) {
                let pX = i * 400 - (camera.x * 0.2) % 400;
                ctx.beginPath(); ctx.moveTo(pX - 250, canvas.height); ctx.lineTo(pX, canvas.height - 200); ctx.lineTo(pX + 250, canvas.height); ctx.fill();
            }
        }

        // Polyfill roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            ctx.save();
            ctx.translate(-camera.x, 0);

            // วาดเส้นชัย
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fillRect(finishLine.x, 0, finishLine.w, canvas.height);
            // ธงหมากรุกใหญ่ๆ
            for(let i=0; i<10; i++) {
                ctx.fillStyle = i%2===0 ? "#fbbf24" : "#f59e0b";
                ctx.fillRect(finishLine.x, canvas.height - 300 + (i*30), 120, 30);
            }
            ctx.font = "80px Arial"; ctx.fillText("🏁", finishLine.x + 20, canvas.height - 320);

            // วาดแท่นพื้น (Platforms) - ออกแบบให้เป็นลูกกวาด/ดินน้ำมัน
            for (let p of platforms) {
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 20); ctx.fill();
                
                // หญ้าด้านบน (Highlight)
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, 15, 20); ctx.fill();

                // ลวดลายเม็ดน้ำตาล (Sprinkles) บนพื้น
                ctx.fillStyle = "rgba(0,0,0,0.05)";
                for(let i=10; i<p.w-10; i+=30) {
                    ctx.beginPath(); ctx.arc(p.x + i, p.y + 30, 4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(p.x + i + 15, p.y + 50, 3, 0, Math.PI*2); ctx.fill();
                }
            }

            // วาดเห็ดเรืองแสง
            for (let m of mushrooms) {
                if (m.active) {
                    // แสงออร่า
                    let aura = Math.abs(Math.sin(Date.now()/300)) * 20;
                    ctx.shadowBlur = aura; ctx.shadowColor = "#60a5fa";
                    
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(m.x+25, m.y+m.floatY+25, 20, 0, Math.PI*2); ctx.fill(); // วงกลมพื้นหลังรองรับ Emoji
                    ctx.shadowBlur = 0; // ปิดเงาเพื่อไม่ให้เละ

                    ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText("🍄", m.x+25, m.y + m.floatY + 25);
                    
                    // ไอคอน ? บนเห็ด
                    ctx.fillStyle = "white"; ctx.font = "bold 20px Nunito"; ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 3;
                    ctx.strokeText("?", m.x+40, m.y + m.floatY); ctx.fillText("?", m.x+40, m.y + m.floatY);
                    ctx.textAlign = "start"; ctx.textBaseline = "alphabetic"; // reset
                }
            }

            // วาด Player (มี Squash & Stretch และเอียงตัว)
            ctx.save();
            // ย้ายจุดหมุนไปที่กึ่งกลางฐานของตัวละคร เพื่อให้ยืดหดจากพื้น
            ctx.translate(player.x + player.width/2, player.y + player.height);
            ctx.rotate(player.rot);
            ctx.scale(player.scaleX, player.scaleY);
            
            // วาดตัว Blob (แคปซูล)
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.beginPath();
            ctx.roundRect(-player.width/2, -player.height, player.width, player.height, 20);
            ctx.fill(); ctx.shadowBlur = 0; // ปิดเงา
            
            ctx.strokeStyle = "#ec4899"; ctx.lineWidth = 4; ctx.stroke(); // ขอบสีชมพู

            // วาด Avatar บนตัว
            ctx.font = "35px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(player.avatar, 0, -player.height/2);
            ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";

            ctx.restore();

            // วาด Particles (พลุ)
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.update(); p.draw(ctx);
                if(p.life <= 0) particles.splice(i, 1);
            }

            ctx.restore(); // คืนค่ากล้อง
        }

        function loop() {
            update(); draw();
            animationId = requestAnimationFrame(loop);
        }

    </script>
</body>
